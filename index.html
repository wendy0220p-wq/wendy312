<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>粘雅茵的個人履歷</title>
    <style>
        :root { --melon: #b7e4c7; --yellow: #fff9c4; }
        body { background-color: #f7fff7; font-family: "Microsoft JhengHei"; display: flex; justify-content: center; padding: 40px; }
        .card { background: white; width: 100%; max-width: 500px; border-radius: 20px; border: 4px solid var(--melon); overflow: hidden; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        header { background: #e2f0d9; padding: 30px; border-bottom: 5px solid var(--yellow); }
        .pic { width: 180px; height: 180px; border-radius: 15px; border: 5px solid white; object-fit: cover; margin-bottom: 10px; }
        h1 { color: #2d5a27; margin: 10px 0; }
        .info { padding: 20px; text-align: left; }
        .item { background: #fdfdfd; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="card">
        <header>
            <img src="雅菌的資科履歷表-照片.jpg" class="pic">
            <h1>粘雅茵</h1>
            <p>亞洲大學 時尚設計系</p>
        </header>
        <div class="info">
            <div class="item"><strong>學號</strong><span>AU114054056</span></div>
            <div class="item"><strong>系級</strong><span>時尚系一A</span></div>
            <p style="padding:10px; color:#666;">這是我的資科作業，很高興認識大家！</p>
        </div>
    </div>
</body>
</html>
